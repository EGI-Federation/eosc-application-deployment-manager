---
openapi: 3.1.0
components:
  schemas:
    Date:
      type: string
      format: date
      example: 2025-02-17
    Version:
      type: string
    Success:
      type: object
      properties:
        message:
          type: string
          description: Confirmation message
    Error:
      type: object
      properties:
        id:
          type: string
          description: Error type
        description:
          type: string
          description: Error message
        details:
          type: object
          additionalProperties:
            type: string
          description: Additional details about the error
    Property:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    OpenStackEnvironment:
      type: object
      required:
        - kind
        - host
        - authVersion
        - userName
        - tenant
        - domain
      properties:
        kind:
          type: string
          default: OpenStackEnvironment
        userName:
          type: string
        domain:
          type: string
          format: hostname
        domainId:
          type: string
        tenant:
          type: string
        tenantId:
          type: string
        region:
          type: string
        host:
          type: string
          format: url
        authVersion:
          type: string
          enum:
            - "3.x-oidc"
        apiVersion:
          type: string
    KubernetesEnvironment:
      type: object
      required:
        - kind
        - host
      properties:
        kind:
          type: string
          default: KubernetesEnvironment
        host:
          type: string
          format: url
    EoscNodeEnvironment:
      type: object
      required:
        - kind
        - offer
        - nodeId
        - projectId
        - awmApi
      properties:
        kind:
          type: string
          default: EoscNodeEnvironment
        offer:
          type: object
          required:
            - offerId
            - offerType
          properties:
            offerId:
              type: string
            offerName:
              type: string
            offerType:
              type: string
              enum:
                - openstack
                - kubernetes
            cpus:
              type: integer
              minimum: 1
            gpus:
              type: integer
            memory:
              type: integer
              minimum: 1
              description: RAM quota in GB
            fastStorage:
              type: integer
              description: SSD or NVMe based (fast) storage quota in GB
            bulkStorage:
              type: integer
              description: HDD based (slow) storage quota in GB
            s3Storage:
              type: integer
              description: S3 storage quota in GB
            registryStorage:
              type: integer
              description: Container Registry storage quota in GB
            creditsPerDay:
              type: integer
              minimum: 1
        projectId:
          type: string
        hostname:
          type: string
          format: url
        provisionedOn:
          type: string
          format: date-time
          example: 2025-02-17T14:27:01.000+0100
        expiresOn:
          type: string
          format: date-time
          example: 2025-02-17T14:27:01.000+0100
        nodeId:
          type: string
          description: Unique identifier of the EOSC node where this environment was allocated
        nodeName:
          type: string
          description: Name of the EOSC node where this environment was allocated
        nodeUI:
          type: string
          format: url
          description: URL to the interactive UI of the EOSC node where this environment was allocated
        awmAPI:
          type: string
          format: url
          description: |-
            Base URL for the AWM API of the EOSC node where this environment was allocated, 
            or null for environments private to the calling user that are accessed via 
            explicit credentials
    Allocation:
      oneOf:
        - $ref: "#/components/schemas/EoscNodeEnvironment"
        - $ref: "#/components/schemas/OpenStackEnvironment"
        - $ref: "#/components/schemas/KubernetesEnvironment"
      discriminator:
        propertyName: kind
    AllocationId:
      type: object
      description: Where to deploy
      required:
        - id
        - infoLink
      properties:
        kind:
          type: string
          default: AllocationId
        id:
          type: string
          description: Unique identifier for this allocation
        infoLink:
          type: string
          format: url
          description: Endpoint that returns more details about this allocation
    AllocationInfo:
      allOf:
        - $ref: "#/components/schemas/Allocation"
        - type: object
          required:
            - id
            - self
          properties:
            id:
              type: string
              description: Unique identifier for this allocation
            self:
              type: string
              format: url
              description: Endpoint that returns the details of this allocation
    ApplicationId:
      type: object
      description: What to deploy
      required:
        - id
        - version
        - infoLink
      properties:
        kind:
          type: string
          default: ApplicationId
        id:
          type: string
          description: Unique identifier for this application blueprint
        version:
          type: string
          description: The specific version of this blueprint version
        infoLink:
          type: string
          format: url
          description: URL that returns the full details of this application blueprint version
    ApplicationInfo:
      type: object
      required:
        - type
        - blueprint
        - blueprintType
      properties:
        kind:
          type: string
          default: ApplicationInfo
        id:
          type: string
          description: Unique identifier for this application blueprint
        nodeId:
          type: string
          description: Unique identifier of the EOSC node where this application blueprint is hosted
        type:
          type: string
          enum:
            - vm
            - container
        blueprint:
          type: string
          description: Prescriptive IaC script of the application's workload
        blueprintType:
          type: string
          enum:
            - tosca
            - ansible
            - helm
          default: tosca
        name:
          type: string
        description:
          type: string
        published:
          type: boolean
          default: false
        favorite:
          type: boolean
          default: false
        authorName:
          type: string
        authorEmail:
          type: string
          format: email
        organisation:
          type: string
        keywords:
          type: array
          items: 
            type: string
        license:
          type: string
        version:
          type: string
          description: The blueprint version used in a deployment
        versionFrom:
          type: string
          description: The modified datetime of the blueprint version used in a deployment
          format: date-time
          example: 2025-02-17T14:27:01.000+0100
        versionLatest:
          type: string
          description: The latest version of the blueprint
        repository:
          type: string
          format: url
        helpdesk:
          type: string
          format: url
        validated:
          type: boolean
        validatedOn:
          type: string
          format: date-time
          example: 2025-02-17T14:27:01.000+0100
        self:
          type: string
          format: url
          description: Endpoint that returns the details of this application blueprint
    Deployment:
      type: object
      required:
        - application
        - allocation
      properties:
        application:
          $ref: "#/components/schemas/ApplicationId"
        allocation:
          $ref: "#/components/schemas/AllocationId"
        inputs:
          description: Input values for the template
          type: array
          items:
            $ref: "#/components/schemas/Property"
    DeploymentId:
      type: object
      required:
        - id
        - infoLink
      properties:
        kind:
          type: string
          default: DeploymentId
        id:
          type: string
          description: Unique identifier for this deployment
        infoLink:
          type: string
          format: url
          description: Endpoint that returns more details about this deployment
    DeploymentInfo:
      allOf:
        - $ref: "#/components/schemas/Deployment"
        - type: object
          required:
            - id
            - self
          properties:
            kind:
              type: string
              default: DeploymentInfo
            id:
              type: string
              description: Unique identifier for this deployment
            status:
              type: string
              enum:
                - unknown
                - pending
                - running
                - stopped
                - off
                - failed
                - configured
                - unconfigured
                - deleting
                - deleted
            details:
              type: string
              description: Additional information about the deployment status
            outputs:
              description: Output values from deployed template
              type: array
              items:
                $ref: "#/components/schemas/Property"
            self:
              type: string
              format: url
              description: Endpoint that returns the details of this deployment
    Page:
      type: object
      required:
        - from
        - limit
        - count
      properties:
        from:
          type: integer
          description: Index of the first returned element
        limit:
          type: integer
          description: Maximum number of elements to return at once
        count:
          type: integer
          description: Total number of elements
        self:
          type: string
          format: url
          description: Endpoint that returned this page
        prevPage:
          type: string
          format: url
          description: Endpoint that returns the previous page
        nextPage:
          type: string
          format: url
          description: Endpoint that returns the next page
    PageOfAllocations:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          required:
            - elements
          properties:
            elements:
              type: array
              items:
                $ref: "#/components/schemas/AllocationInfo"
    PageOfApplications:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          required:
            - elements
          properties:
            elements:
              type: array
              items:
                $ref: "#/components/schemas/ApplicationInfo"
    PageOfDeployments:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          required:
            - elements
          properties:
            elements:
              type: array
              items:
                $ref: "#/components/schemas/DeploymentInfo"

  securitySchemes:
    OIDC:
      description: OpenID Connect access token issued by EOSC AAI
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /allocations:
    get:
      summary: List all environments available to the user
      operationId: listAllocations
      parameters:
      - name: from
        description: Index of the first element to return
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        description: Maximum number of elements to return
        in: query
        schema:
          type: integer
          minimum: 1
          default: 100
      - name: allNodes
        in: query
        required: true
        schema:
          type: boolean
          default: false
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageOfAllocations"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Allocations

  /allocation/{allocationId}:
    parameters:
      - name: allocationId
        in: path
        required: true
        schema:
          type: string
  
    get:
      summary: Retrieve information about an environment available to the user
      operationId: getAllocationInfo
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocationInfo"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Allocations

  /applications:
    get:
      summary: List all application blueprints
      operationId: listApplications
      parameters:
      - name: from
        description: Index of the first element to return
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        description: Maximum number of elements to return
        in: query
        schema:
          type: integer
          minimum: 1
          default: 100
      - name: includePublished
        description: Return published blueprints
        in: query
        required: true
        schema:
          type: boolean
          default: true
      - name: includePersonal
        description: Return blueprints private to the caller (not  yet published)
        in: query
        required: true
        schema:
          type: boolean
          default: false
      - name: onlyFavorites
        description: Return only those blueprints that were marked as a favorite by the caller
        in: query
        required: true
        schema:
          type: boolean
          default: false
      - name: allNodes
        in: query
        required: true
        schema:
          type: boolean
          default: false
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageOfApplications"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Applications

  /application/{applicationId}:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
      - name: version
        description: If missing, the latest version will be returned
        in: query
        required: false
        schema:
          type: string

    get:
      summary: Get information about an application blueprint
      operationId: getApplication
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationInfo"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Applications

  /deployments:
    get:
      summary: List existing deployments
      operationId: listDeployments
      parameters:
      - name: from
        description: Index of the first element to return
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        description: Maximum number of elements to return
        in: query
        schema:
          type: integer
          minimum: 1
          default: 100
      - name: allNodes
        in: query
        required: true
        schema:
          type: boolean
          default: false
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageOfDeployments"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Deployments

    post:
      summary: |
        Deploy workload to an environment for which the user has credentials
      operationId: deployWorkload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Deployment"
        required: true
      responses:
        202:
          description: Deploying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentId"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Deployments

  /deployment/{deploymentId}:
    parameters:
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get information about an existing deployment
      operationId: getDeployment
      responses:
        200:
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentInfo"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Deployments

    delete:
      summary: Tear down an existing deployment
      operationId: deleteDeployment
      responses:
        202:
          description: Deleting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        400:
          description: Invalid parameters or configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        403:
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        419:
          description: Re-delegate credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        503:
          description: Try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OIDC: []
      tags:
        - Deployments

  /version:
    get:
      summary: Return service version information
      operationId: version
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
      tags:
        - Service
info:
  title: EOSC Application Workflow Management API
  version: 1.0.49
  description: Deployment service for European Open Science Cloud nodes
  contact:
    name: EOSC
    url: https://open-science-cloud.ec.europa.eu/
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
